# Cloudflare Workers configuration for WeatherStar 4000+
# See CLOUDFLARE_WORKERS_DEPLOYMENT.md for full deployment instructions

name = "ws4000"
main = "src/index.js"
compatibility_date = "2024-09-23"

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

# Uncomment [vars] and add your WSQS_* variables to pin a static location and
# display settings for every visitor. Variables can also be set (or overridden)
# in the Cloudflare dashboard under Workers & Pages > your worker >
# Settings > Variables and Secrets.
#
# The WSQS_ prefix is stripped and each underscore becomes a hyphen in the
# resulting query-string key:
#   WSQS_latLonQuery = "Orlando"  →  ?latLonQuery=Orlando
#   WSQS_hazards_checkbox = "false"  →  &hazards-checkbox=false
#
# See wrangler.toml.example for ready-to-use configurations.

 [vars]
 WSQS_latLonQuery = "Philadelphia International Airport, Philadelphia, Pa, USA"
 WSQS_kiosk = "true"
 WSQS_hazards_checkbox = "true"
WSQS_current_weather_checkbox = "true"
WSQS_latest_observations_checkbox = "true"
WSQS_hourly_graph_checkbox = "true"
WSQS_travel_checkbox = "false"
WSQS_regional_forecast_checkbox = "true"
WSQS_local_forecast_checkbox = "true"
WSQS_extended_forecast_checkbox = "true"
WSQS_almanac_checkbox = "false"
WSQS_spc_outlook_checkbox = "true"
WSQS_radar_checkbox = "true"
